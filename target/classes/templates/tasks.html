<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Tasks | BrainWave</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="container mt-4">

<header class="mb-4">
    <nav class="nav nav-pills">

    <a class="nav-link" th:href="@{/}">Home</a>
    <a class="nav-link" th:href="@{/about}">About</a>
    <a class="nav-link" th:href="@{/features}">Features</a>

    <a class="nav-link"
       sec:authorize="hasAnyRole('ADMIN','TEACHER')"
       th:href="@{/assignments/new}">
        Add Assignment
    </a>

    <a class="nav-link"
       sec:authorize="isAuthenticated()"
       th:href="@{/assignments}">
        View Assignments
    </a>

    <a class="nav-link"
       sec:authorize="hasRole('STUDENT')"
       th:href="@{/tasks/new}">
        Create Task
    </a>

    <a class="nav-link active"
       sec:authorize="hasRole('STUDENT')"
       th:href="@{/tasks}">
        My Tasks
    </a>

</nav>
</header>

<h1 class="mb-4">My Tasks</h1>

<div class="table-responsive">
    <table class="table table-striped table-hover border">
        <thead class="table-dark">
            <tr>
                <th>Title</th>
                <th>Due Date</th>
                <th>Description</th>
                <th>Created At</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="task : ${tasks}">
                <td th:text="${task.title}"></td>
                <td th:text="${task.dueDate}"></td>
                <td th:text="${task.description}"></td>
                <td th:text="${task.createdAt}"></td>
                <td>
                    <a class="btn btn-sm btn-outline-primary" th:href="@{/tasks/edit/{id}(id=${task.id})}">Edit</a>
                    <a class="btn btn-sm btn-outline-danger" th:href="@{/tasks/delete/{id}(id=${task.id})}">Delete</a>
                </td>
            </tr>

            <tr th:if="${#lists.isEmpty(tasks)}">
                <td colspan="4" class="text-center text-muted py-3">
                    No tasks found.
                </td>
            </tr>
        </tbody>
    </table>
</div>

</body>
</html>
