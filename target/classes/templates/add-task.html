<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Add Task | BrainWave</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="container mt-4">
    
<div th:replace="navbar :: navbar"></div>

<div class="p-4 bg-light border rounded">
    <h1 class="mb-4">Add Task</h1>

    <form th:action="${task.id} != null ? @{/tasks/update/{id}(id=${task.id})} : @{/tasks}" th:object="${task}" method="post">

        <div class="mb-3">
            <label class="form-label fw-bold">Title</label>
            <input type="text" class="form-control" th:field="*{title}">
            <div class="text-danger" th:if="${#fields.hasErrors('title')}" th:errors="*{title}"></div>
        </div>

        <div class="mb-3">
            <label class="form-label fw-bold">Due Date</label>
            <input type="date" class="form-control" th:field="*{dueDate}">
            <div class="text-danger" th:if="${#fields.hasErrors('dueDate')}" th:errors="*{dueDate}"></div>
        </div>

        <div class="mb-3">
            <label class="form-label fw-bold">Description</label>
            <textarea class="form-control" rows="3" th:field="*{description}"></textarea>
            <div class="text-danger" th:if="${#fields.hasErrors('description')}" th:errors="*{description}"></div>
        </div>

        <button type="submit" class="btn btn-primary">Save Task</button>
    </form>
</div>

</body>
</html>
