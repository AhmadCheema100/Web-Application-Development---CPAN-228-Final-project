<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Add Assignment | BrainWave</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body class="container mt-4">

<header class="mb-4">
    <nav class="nav nav-pills">
        <a class="nav-link" th:href="@{/}">Home</a>
        <a class="nav-link" th:href="@{/about}">About</a>
        <a class="nav-link" th:href="@{/features}">Features</a>
        <a class="nav-link active" th:href="@{/assignments/new}">Add Assignment</a>
        <a class="nav-link" th:href="@{/assignments}">View Assignments</a>
    </nav>
</header>

<div class="p-4 bg-light border rounded">

<h1 class="mb-4">Add Assignment</h1>

<form th:action="@{/assignments}" th:object="${assignment}" method="post">

<div class="mb-3">
<label class="form-label fw-bold">Title</label>
<input type="text" class="form-control" th:field="*{title}">
</div>

<div class="mb-3">
<label class="form-label fw-bold">Course</label>
<input type="text" class="form-control" th:field="*{courseName}">
</div>

<div class="mb-3">
<label class="form-label fw-bold">Due Date</label>
<input type="date" class="form-control" th:field="*{dueDate}">
</div>

<div class="mb-3">
<label class="form-label fw-bold">Priority</label>
<select class="form-select" th:field="*{priority}">
<option th:each="p : ${priorities}" th:value="${p}" th:text="${p}"></option>
</select>
</div>

<div class="mb-3">
<label class="form-label fw-bold">Status</label>
<select class="form-select" th:field="*{status}">
<option th:each="s : ${statuses}" th:value="${s}" th:text="${s}"></option>
</select>
</div>

<div class="mb-3">
<label class="form-label fw-bold">Description</label>
<textarea class="form-control" rows="3" th:field="*{description}"></textarea>
</div>

<button type="submit" class="btn btn-primary">Save Assignment</button>

</form>

</div>

</body>
</html>
