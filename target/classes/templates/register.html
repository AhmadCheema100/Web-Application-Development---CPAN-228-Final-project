<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Register | BrainWave</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="container mt-4">

<div th:replace="navbar :: navbar"></div>

<div class="auth-wrapper">
    <div class="auth-card">
        <div class="text-center mb-4">
            <h1 class="mb-2">Create Account</h1>
            <p class="text-muted mb-0">Join BrainWave and start managing your work.</p>
        </div>

        <form th:action="@{/register}" th:object="${user}" method="post">
            <div class="mb-3">
                <label class="form-label fw-bold">Username</label>
                <input type="text" class="form-control" th:field="*{username}" placeholder="Choose a username">
                <div class="text-danger mt-1" th:if="${#fields.hasErrors('username')}" th:errors="*{username}"></div>
            </div>

            <div class="mb-4">
                <label class="form-label fw-bold">Password</label>
                <input type="password" class="form-control" th:field="*{password}" placeholder="Create a password">
                <div class="text-danger mt-1" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>
            </div>

            <button type="submit" class="btn btn-primary w-100">Register</button>
        </form>

        <p class="text-center mt-4 mb-0">
            Already have an account?
            <a th:href="@{/login}">Login here</a>
        </p>
    </div>
</div>

</body>
</html>
