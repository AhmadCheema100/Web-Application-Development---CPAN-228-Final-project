<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8">
    <title>BrainWave | Features</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body class="container mt-4">

<header class="mb-4">
    <nav class="nav nav-pills">

    <a class="nav-link" th:href="@{/}">Home</a>
    <a class="nav-link" th:href="@{/about}">About</a>
    <a class="nav-link active" th:href="@{/features}">Features</a>

    <a class="nav-link"
       sec:authorize="hasAnyRole('ADMIN','TEACHER')"
       th:href="@{/assignments/new}">
        Add Assignment
    </a>

    <a class="nav-link"
       sec:authorize="isAuthenticated()"
       th:href="@{/assignments}">
        View Assignments
    </a>

    <a class="nav-link"
       sec:authorize="hasRole('STUDENT')"
       th:href="@{/tasks/new}">
        Create Task
    </a>

    <a class="nav-link"
       sec:authorize="hasRole('STUDENT')"
       th:href="@{/tasks}">
        My Tasks
    </a>

</nav>
</header>

<div class="p-4 bg-light border rounded">
    <h1 class="mb-3">BrainWave Features</h1>
    <ul class="list-group">
        <li class="list-group-item">Track assignments clearly</li>
        <li class="list-group-item">Manage coursework easily</li>
        <li class="list-group-item">Simple and intuitive navigation</li>
    </ul>
</div>

</body>
</html>
