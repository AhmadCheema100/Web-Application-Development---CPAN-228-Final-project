<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard | BrainWave</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="container mt-4">

    <div th:replace="~{navbar :: navbar}"></div>

    <main>
        <div class="alert alert-dismissible alert-warning mb-4 shadow-sm border">
            <h4 class="alert-heading fw-bold">WARNING!</h4>
            <p class="mb-0">You are viewing the BrainWave Administrator Dashboard. Changes made here affect the entire system.</p>
        </div>

        <h1 class="mb-4 text-primary">System Overview</h1>

        <div class="row mb-5">
            <div class="col-md-6">
                <div class="card text-dark bg-light mb-3 shadow-sm border-0">
                    <div class="card-header fw-bold">Total Assignments</div>
                    <div class="card-body">
                        <h2 class="card-title display-4" th:text="${totalAssignments}">0</h2>
                        <a th:href="@{/assignments}" class="text-primary text-decoration-none border-bottom">Manage All Assignments &#8594;</a>
                    </div>
                </div>
            </div>
            <div class="col-md-6">
                <div class="card text-dark bg-light mb-3 shadow-sm border-0">
                    <div class="card-header fw-bold">Total Tasks</div>
                    <div class="card-body">
                        <h2 class="card-title display-4" th:text="${totalTasks}">0</h2>
                        <a th:href="@{/tasks}" class="text-primary text-decoration-none border-bottom">Manage All Tasks &#8594;</a>
                    </div>
                </div>
            </div>
        </div>

        <h2 class="mb-3 text-secondary">Registered Users</h2>
        <div class="table-responsive shadow-sm border rounded p-1 bg-white">
            <table class="table table-hover table-striped mb-0">
                <thead class="table-dark">
                    <tr>
                        <th>ID</th>
                        <th>Username</th>
                        <th>System Role</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="user : ${users}">
                        <td th:text="${user.id}"></td>
                        <td class="fw-bold text-primary" th:text="${user.username}"></td>
                        <td>
                            <span class="badge rounded-pill" 
                                  th:classappend="${user.role == 'ROLE_ADMIN'} ? 'bg-danger' : (${user.role == 'ROLE_TEACHER'} ? 'bg-warning text-dark' : 'bg-success')"
                                  th:text="${#strings.replace(user.role, 'ROLE_', '')}">
                            </span>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>

</body>
</html>
