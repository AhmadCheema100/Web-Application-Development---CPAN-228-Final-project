<div th:fragment="navbar"
     xmlns:th="http://www.thymeleaf.org"
     xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

    <header class="mb-4">
        <nav class="nav nav-pills d-flex flex-nowrap align-items-center gap-2 overflow-x-auto pb-2">

            <a class="nav-link" th:href="@{/}">Home</a>
            <a class="nav-link" th:href="@{/about}">About</a>
            <a class="nav-link" th:href="@{/features}">Features</a>

            <a class="nav-link text-center"
               sec:authorize="hasAnyRole('ADMIN','TEACHER')"
               th:href="@{/assignments/new}">
                Add Assignment
            </a>

            <a class="nav-link text-center"
               sec:authorize="isAuthenticated()"
               th:href="@{/assignments}">
                View Assignments
            </a>

            <a class="nav-link text-center"
               sec:authorize="hasAnyRole('ADMIN','STUDENT')"
               th:href="@{/tasks/new}">
                Create Task
            </a>

            <a class="nav-link text-center"
               sec:authorize="hasAnyRole('ADMIN','STUDENT')"
               th:href="@{/tasks}">
                My Tasks
            </a>

            <a class="nav-link text-center"
               sec:authorize="hasRole('ADMIN')"
               th:href="@{/h2-console}">
                H2 Console
            </a>

            <a class="nav-link text-warning fw-bold text-center"
               sec:authorize="hasRole('ADMIN')"
               th:href="@{/admin/dashboard}">
                Admin Dashboard
            </a>

            <div class="ms-auto d-flex align-items-center gap-3">
                
                <a class="nav-link fw-bold"
                   sec:authorize="isAnonymous()"
                   th:href="@{/login}">
                    Login
                </a>
                <a class="btn btn-primary text-white px-3"
                   sec:authorize="isAnonymous()"
                   th:href="@{/register}">
                    Register
                </a>

                <span class="badge bg-dark py-2 px-3" sec:authorize="isAuthenticated()">
                    Logged in as: <span sec:authentication="name"></span>
                </span>

                <form sec:authorize="isAuthenticated()" th:action="@{/logout}" method="post" class="m-0 p-0 d-flex">
                    <button type="submit" class="nav-link text-danger fw-bold border-0 bg-transparent m-0">
                        Logout
                    </button>
                </form>
            </div>

        </nav>
    </header>
</div>
