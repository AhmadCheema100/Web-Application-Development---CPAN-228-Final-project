<div th:fragment="navbar"
     xmlns:th="http://www.thymeleaf.org"
     xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

    <header class="mb-4">
        <nav class="nav nav-pills d-flex align-items-center gap-2 app-nav p-3 rounded border bg-white">
            <a class="nav-link" th:href="@{/}">Home</a>
            <a class="nav-link" th:href="@{/about}">About</a>
            <a class="nav-link" th:href="@{/features}">Features</a>

            <a class="nav-link"
               sec:authorize="hasAnyRole('ADMIN','TEACHER')"
               th:href="@{/assignments}">
                Assignments
            </a>

            <a class="nav-link"
               sec:authorize="hasAnyRole('ADMIN','TEACHER')"
               th:href="@{/assignments/new}">
                Add Assignment
            </a>

            <a class="nav-link"
               sec:authorize="hasAnyRole('ADMIN','STUDENT')"
               th:href="@{/tasks}">
                Tasks
            </a>

            <a class="nav-link"
               sec:authorize="hasAnyRole('ADMIN','STUDENT')"
               th:href="@{/tasks/new}">
                Add Task
            </a>

            <a class="nav-link"
               sec:authorize="hasRole('ADMIN')"
               th:href="@{/h2-console}">
                H2 Console
            </a>

            <a class="nav-link ms-auto"
               sec:authorize="isAnonymous()"
               th:href="@{/login}">
                Login
            </a>

            <a class="nav-link"
               sec:authorize="isAnonymous()"
               th:href="@{/register}">
                Register
            </a>

            <span class="ms-auto badge bg-dark"
                  sec:authorize="isAuthenticated()"
                  sec:authentication="name"></span>

            <span class="badge bg-secondary"
                  sec:authorize="hasRole('ADMIN')">
                ADMIN
            </span>

            <span class="badge bg-secondary"
                  sec:authorize="hasRole('TEACHER')">
                TEACHER
            </span>

            <span class="badge bg-secondary"
                  sec:authorize="hasRole('STUDENT')">
                STUDENT
            </span>

            <a class="nav-link text-danger"
               sec:authorize="isAuthenticated()"
               th:href="@{/logout}">
                Logout
            </a>
        </nav>
    </header>
</div>
