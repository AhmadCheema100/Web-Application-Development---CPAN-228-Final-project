<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Login | BrainWave</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="container mt-4">

<div th:replace="navbar :: navbar"></div>

<div class="auth-wrapper">
    <div class="auth-card">
        <div class="text-center mb-4">
            <h1 class="mb-2">Welcome Back</h1>
            <p class="text-muted mb-0">Sign in to continue using BrainWave.</p>
        </div>

        <div class="alert alert-danger" th:if="${param.error}">
            The username or password was incorrect. Please try again.
        </div>

        <div class="alert alert-success" th:if="${param.logout}">
            You have been logged out successfully.
        </div>

        <form th:action="@{/login}" method="post">
            <div class="mb-3">
                <label class="form-label fw-bold">Username</label>
                <input type="text" name="username" class="form-control" placeholder="Enter your username" required>
            </div>

            <div class="mb-4">
                <label class="form-label fw-bold">Password</label>
                <input type="password" name="password" class="form-control" placeholder="Enter your password" required>
            </div>

            <button type="submit" class="btn btn-primary w-100">Login</button>
        </form>

        <p class="text-center mt-4 mb-0">
            Need an account?
            <a th:href="@{/register}">Create one here</a>
        </p>
    </div>
</div>

</body>
</html>
