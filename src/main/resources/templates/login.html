<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login | BrainWave</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="container mt-4">

<div th:replace="navbar :: navbar"></div>

<div class="row justify-content-center">
    <div class="col-md-7 col-lg-5">
        <div class="p-4 bg-light border rounded shadow-sm">
            <h1 class="mb-3">Login</h1>
            <p class="text-muted mb-4">Sign in to manage assignments and tasks.</p>

            <div class="alert alert-danger" th:if="${param.error}">
                Login failed. Check your username and password and try again.
            </div>

            <div class="alert alert-success" th:if="${param.logout}">
                You have been logged out successfully.
            </div>

            <form th:action="@{/login}" method="post">
                <div class="mb-3">
                    <label class="form-label fw-bold">Username</label>
                    <input type="text" name="username" class="form-control" placeholder="Enter your username">
                </div>

                <div class="mb-4">
                    <label class="form-label fw-bold">Password</label>
                    <input type="password" name="password" class="form-control" placeholder="Enter your password">
                </div>

                <button type="submit" class="btn btn-primary w-100">Login</button>
            </form>

            <p class="mt-3 mb-0">Need an account? <a th:href="@{/register}">Register here</a></p>
        </div>
    </div>
</div>

</body>
</html>
